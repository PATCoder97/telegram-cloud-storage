name: Build and Push Telegram Cloud Storage Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version_tag:
        description: "Version tag to build manually, vd: v1.0.0"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: telegram-cloud-storage-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-build-trigger:
    name: Check if build should trigger
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      version_tag: ${{ steps.check.outputs.version_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve build version
        id: check
        shell: bash
        run: |
          MANUAL_TAG="${{ github.event.inputs.version_tag }}"
          if [[ -n "$MANUAL_TAG" ]]; then
            echo "Manual version tag: $MANUAL_TAG"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "version_tag=$MANUAL_TAG" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          COMMIT_MSG="$(git log -1 --pretty=%s)"
          echo "Commit message: $COMMIT_MSG"

          if [[ "$COMMIT_MSG" =~ \[(v[^]]+)\] ]]; then
            TAG="${BASH_REMATCH[1]}"
            echo "Version tag found: $TAG"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "version_tag=$TAG" >> "$GITHUB_OUTPUT"
          else
            echo "No version tag [v*] found - skipping build"
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "version_tag=" >> "$GITHUB_OUTPUT"
          fi

  python-check:
    name: Python Check
    runs-on: ubuntu-latest
    needs: check-build-trigger
    if: needs.check-build-trigger.outputs.should_build == 'true'
    env:
      DATA_DIR: ./ci-data
      TELEGRAM_BOT_TOKEN: dummy-token
      TELEGRAM_CHAT_ID: dummy-chat
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Bytecode check
        run: python -m py_compile app.py

      - name: Import app
        run: python -c "import app; print('telegram_cloud_storage import ok')"

  build-image:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs:
      - check-build-trigger
      - python-check
    if: needs.check-build-trigger.outputs.should_build == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            patcoder97/telegram-cloud-storage:${{ needs.check-build-trigger.outputs.version_tag }}
            patcoder97/telegram-cloud-storage:latest
          cache-from: type=registry,ref=patcoder97/telegram-cloud-storage:buildcache
          cache-to: type=registry,ref=patcoder97/telegram-cloud-storage:buildcache,mode=max

      - name: Deploy status
        shell: bash
        run: |
          echo "Image pushed successfully"
          echo "  -> patcoder97/telegram-cloud-storage:${{ needs.check-build-trigger.outputs.version_tag }}"
          echo "  -> patcoder97/telegram-cloud-storage:latest"
